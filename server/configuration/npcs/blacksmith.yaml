npc_blacksmith:
  tree:
    start:
      dialog:
        - line: |
            <npc> says "Come to chit chat about reforging?"
      options:
        - line: |
              ask "What is reforging?"
          goto: what
        - line: |
              ask "How do I reforge?"
          goto: how
    
    what:
      dialog:
          - line: |
              <npc> says "Ah! reforging is the act of rubbin scrap on an item til its all better." They lean in closer "Reforging an item costs the item level times 10 in scrap, so a level 10 item woud cost ya about 100 scrap to reforge"
      options:
        - line: |
              ask "How do I reforge?"
          goto: how

    how:
      dialog:
          - line: |
              <npc> says "You simply @tip"reforge <item>"@back then ya lean back and pray it dont stink!"
      options:
        - line: |
              ask "What is reforging?"
          goto: what


    start_shopping:
      append_to: start
      options:
        - line: |
            ask about wares
          goto: shopping

    shopping:
      dialog:
        - line: |
            <npc> says "I got plenty to sell!"
        - line: |
            <npc> says "What can I get ya?"
        - line: |
            <npc> says "Need anything?"
      options:
        - line: |
            purchase a Handaxe for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit weapon 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Leather vest for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit body 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Leather hat for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit head 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase a Dirk for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow weapon 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Ragged tunic for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow body 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Ragged hood for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow head 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5


