npc_blacksmith:
  tree:
    start:
      dialog:
        - line: |
            <npc> says "Come to chit chat about reforging?"

    start_shopping:
      append_to: start
      options:
        - line: |
            ask about wares
          goto: shopping

    shopping:
      dialog:
        - line: |
            <npc> says "I got plenty to sell!"
        - line: |
            <npc> says "What can I get ya?"
        - line: |
            <npc> says "Need anything?"
      options:
        - line: |
            purchase a Handaxe for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit weapon 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Leather vest for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit body 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Leather hat for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: grit head 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase a Dirk for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow weapon 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Ragged tunic for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow body 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5

        - line: |
            purchase one Ragged hood for 5 Scrap
          goto: shopping
          trade:
            give_to_player:
              - item: flow head 1
                amount: 1
            give_to_npc:
              - item: currency_0
                amount: 5


    start_reforging:
        append_to: start
        options:
          - line: |
              ask about "reforging"
            goto: reforging

    reforging:
      dialog:
        - line: |
            <npc> says "Reforging? its the act of reshaping the hidden qualities of your equipment.
            The work is unpredictable, and demands a lot of scrap depending on the weapon or armor.
            I can teach you how to reforge, if you do me a favor and kill the shroom trio."
          quest_check:
            - id: blacksmith_reforge
              state: not_started
        - line: |
            <npc> says "Reforging? I told you I will teach you after you kill the shroomtrio"
          quest_check:
            - id: blacksmith_reforge
              state: in_progress
        - line: |
            <npc> says "Reforging? I told you I will teach you after you kill the shroomtrio"
          quest_check:
            - id: blacksmith_reforge
              state: completed
        - line: |
            <npc> says "As I promised, I will teach you how to reforge"
            They stretch then grin "type @tip"help reforge"@normal for more information" 
            They laugh and get back to smithing.
          quest_check:
            - id: blacksmith_reforge
              state: turned_in
      options:
        - line: |
            accept
          goto: reforging_accept
          quest_start: 
              id: blacksmith_reforge
          quest_check:
          - id: blacksmith_reforge
            state: not_started
        - line: |
            tell them you killed the shroomtrio
          goto: reforging
          quest_turn_in:
              id: blacksmith_reforge
              reward_exp: 10
              reward:
                - item: currency_0
                  amount: 25
          quest_check:
          - id: blacksmith_reforge
            state: completed

    reforging_accept:
      dialog:
        - line: |
            <npc> says "Great, go kill them, and I will tell teach you how to reforge"

      
    start_scrap:
        append_to: start
        options:
          - line: |
              ask about "scrapping"
            goto: scrap

    scrap:
      dialog:
        - line: |
            <npc> says "Scrapping? thats easy! type @tip"help scrap"@normal for more information" 